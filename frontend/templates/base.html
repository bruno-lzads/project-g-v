<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <title>Gestão à Vista</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">



</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">Gestão à Vista</span>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>


    {% comment %} scripts do sistema {% endcomment %}

    <script src="/static/js/api.js"></script>
    <script src="/static/js/db.js"></script>
    <script src="/static/js/sync.js"></script>
    <script src="/static/js/dashboard.js"></script>

    <script>
    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js')

        //.then(reg => {
            //console.log('Service Worker registrado com sucesso!');

            //reg.update(); //força update
        //});
        //.catch(err => console.log('Erro ao registrar Service Worker:', err));

        .then(reg => {
            console.log('Service Worker registrado com sucesso!');

            reg.update(); //força update
        })
        .catch(function(error) {
            console.log('Erro ao registrar Service Worker:', error);
        });
    }

    // SYNC AO VOLTAR ONLINE

    async function estaOnlineReal() {
        try{
            const response = await fetch("/api/atividades/", {
                method: "GET",
                cache: "no-store"
            });

            return response.status < 500;
        } catch {
            return false
        }
    }

    // SYNC COM DELAY (CRÍTICO)

    window.addEventListener("online", () => {

        console.log("Internet detectada. Verificando...");
        
        setTimeout(async () => {
            const ok = await estaOnlineReal();

            if (ok) {
                console.log("Internet ok. Sincronizando...");
                sincronizarFila();
            } else {
                console.log("Ainda sem conexão");
            }
        }, 3000);
    });

    // INIT APP
    window.onload = function () {
        carregarAtividades();

        const token = localStorage.getItem("access");

        //if (!token) {
          //  console.warn("Usuário não autenticado");
            //window.location.href = "/"
        //}
    };

    </script>

</body>
</html>
